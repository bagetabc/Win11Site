<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>macOS Sequoia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, 'Inter', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b1a2a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    .desktop {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at 30% 25%, #3f5770 0%, #1b3347 50%, #0a1926 100%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .menubar {
      background: rgba(28, 28, 32, 0.85);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      color: #f0f0f0;
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 13.5px;
      font-weight: 500;
      z-index: 9999;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      width: 100%;
      flex-shrink: 0;
    }

    .menubar-left {
      display: flex;
      align-items: center;
      gap: 0px;
      margin-right: auto;
    }

    .apple-logo {
      cursor: pointer;
      opacity: 0.9;
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 100%;
    }
    .apple-logo:hover {
      background: rgba(255,255,255,0.15);
    }

    .menu-item {
      cursor: pointer;
      padding: 2px 10px;
      border-radius: 4px;
      transition: background 0.12s;
      height: 100%;
      display: flex;
      align-items: center;
    }
    .menu-item:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .menubar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: auto;
      font-size: 13px;
    }
    .menubar-right span {
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
    }
    .menubar-right span:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .desktop-area {
      flex: 1;
      position: relative;
      padding: 18px 14px;
      display: flex;
      flex-wrap: wrap;
      flex-direction: column;
      align-content: flex-start;
      gap: 10px;
      column-gap: 22px;
      max-height: calc(100vh - 56px - 28px);
    }

    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 94px;
      color: white;
      text-align: center;
      cursor: pointer;
      padding: 8px 5px;
      border-radius: 10px;
      transition: background 0.15s;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
      font-size: 12px;
      font-weight: 400;
    }
    .desktop-icon:hover {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(10px);
    }
    .desktop-icon .icon-svg {
      width: 48px;
      height: 48px;
      margin-bottom: 4px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
    }

    .dock-container {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      display: flex;
      justify-content: center;
    }

    .dock {
      background: rgba(245, 245, 250, 0.22);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 26px;
      padding: 9px 18px 11px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.65);
    }

    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.2s;
      cursor: pointer;
      filter: drop-shadow(0 8px 10px black);
      color: white;
    }
    .dock-item .dock-icon {
      width: 44px;
      height: 44px;
    }
    .dock-item span {
      font-size: 10px;
      margin-top: 2px;
      background: rgba(0, 0, 0, 0.6);
      padding: 1px 6px;
      border-radius: 7px;
      color: #ddd;
    }

    .window {
      position: absolute;
      background: rgba(30, 30, 36, 0.78);
      backdrop-filter: blur(42px);
      -webkit-backdrop-filter: blur(42px);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 24px 55px rgba(0, 0, 0, 0.75);
      min-width: 340px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      resize: both;
      z-index: 100;
      color: #e0e0e0;
    }

    .window-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      background: rgba(46, 46, 52, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      cursor: grab;
      height: 44px;
    }

    .traffic-lights {
      display: flex;
      gap: 8px;
      margin-right: 14px;
    }

    .traffic {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.15s;
    }
    .close { background: #ff5f57; }
    .minimize { background: #febc2e; }
    .zoom { background: #28c840; }

    .window-title {
      font-weight: 500;
      font-size: 13px;
      color: #ddd;
      flex: 1;
      text-align: center;
    }

    .window-content {
      padding: 16px;
      flex: 1;
      overflow: auto;
      font-size: 14px;
    }

    .finder-sidebar {
      display: flex;
      height: 100%;
      gap: 12px;
    }
    .sidebar {
      width: 170px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
    }
    .finder-files {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .file-icon {
      text-align: center;
      width: 75px;
      cursor: pointer;
    }
    .file-icon svg {
      width: 38px;
      height: 38px;
    }

    .spotlight-overlay {
      position: fixed;
      top: 32%;
      left: 50%;
      transform: translate(-50%, -32%);
      width: 580px;
      background: rgba(35, 35, 42, 0.92);
      backdrop-filter: blur(50px);
      border-radius: 16px;
      padding: 18px;
      z-index: 10000;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: white;
    }
    .spotlight-input {
      width: 100%;
      background: transparent;
      border: none;
      font-size: 23px;
      color: white;
      outline: none;
      padding: 6px;
    }
    .spotlight-input::placeholder {
      color: #aaa;
    }

    .hidden {
      display: none !important;
    }

    svg {
      display: block;
    }
  </style>
</head>
<body>

<div class="spotlight-overlay" id="spotlightPanel">
  <input type="text" class="spotlight-input" placeholder="Spotlight Search" id="spotlightInput">
</div>

<script>
  (function() {
    const desktop = document.getElementById('desktop');
    let windowZIndex = 200;

    function updateClock() {
      const now = new Date();
      const options = { weekday: 'short', day: 'numeric', month: 'long', hour:'2-digit', minute:'2-digit' };
      document.getElementById('clockDisplay').textContent = now.toLocaleDateString('en-US', options).replace(',','');
    }
    setInterval(updateClock, 1000);
    updateClock();

    const spotlightPanel = document.getElementById('spotlightPanel');
    const spotlightInput = document.getElementById('spotlightInput');
    
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === ' ') {
        e.preventDefault();
        spotlightPanel.style.display = 'block';
        spotlightInput.focus();
      }
      if (e.key === 'Escape') {
        spotlightPanel.style.display = 'none';
        spotlightInput.value = '';
      }
    });

    spotlightInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        alert('Spotlight search: ' + spotlightInput.value);
        spotlightPanel.style.display = 'none';
        spotlightInput.value = '';
      }
    });

    function createWindow(title, contentHTML) {
      const win = document.createElement('div');
      win.className = 'window';
      win.style.left = (130 + Math.random() * 180) + 'px';
      win.style.top = (90 + Math.random() * 160) + 'px';
      win.style.width = '560px';
      win.style.height = '400px';
      win.dataset.title = title;
      win.innerHTML = `
        <div class="window-header" data-window-header>
          <div class="traffic-lights">
            <div class="traffic close" data-action="close"></div>
            <div class="traffic minimize" data-action="minimize"></div>
            <div class="traffic zoom" data-action="zoom"></div>
          </div>
          <div class="window-title">${title}</div>
        </div>
        <div class="window-content">${contentHTML}</div>
      `;
      
      desktop.appendChild(win);
      bringToFront(win);
      
      const header = win.querySelector('[data-window-header]');
      let offsetX, offsetY, dragging = false;
      
      header.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('traffic')) return;
        dragging = true;
        const rect = win.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        win.style.cursor = 'grabbing';
        e.preventDefault();
      });
      
      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        win.style.left = (e.clientX - offsetX) + 'px';
        win.style.top = (e.clientY - offsetY) + 'px';
      });
      
      window.addEventListener('mouseup', () => {
        if (dragging) {
          dragging = false;
          win.style.cursor = '';
        }
      });

      win.querySelector('.close').addEventListener('click', (e) => {
        e.stopPropagation();
        win.remove();
      });
      win.querySelector('.minimize').addEventListener('click', (e) => {
        e.stopPropagation();
        win.style.display = 'none';
      });
      win.querySelector('.zoom').addEventListener('click', (e) => {
        e.stopPropagation();
        if (win.style.width === '100vw') {
          win.style.width = '560px';
          win.style.height = '400px';
          win.style.left = '150px';
          win.style.top = '100px';
        } else {
          win.style.width = '100vw';
          win.style.height = 'calc(100vh - 28px)';
          win.style.left = '0';
          win.style.top = '0';
        }
      });

      win.addEventListener('mousedown', () => bringToFront(win));
      return win;
    }

    function bringToFront(win) {
      windowZIndex++;
      win.style.zIndex = windowZIndex;
    }

    function getFinderContent() {
      return `
        <div class="finder-sidebar">
          <div class="sidebar">
            <div style="font-weight:600;margin-bottom:6px;color:#ccc;">Favorites</div>
            <div style="padding:2px 0;">AirDrop</div>
            <div style="padding:2px 0;">Recents</div>
            <div style="padding:2px 0;">Applications</div>
            <div style="padding:2px 0;">Desktop</div>
            <div style="padding:2px 0;">Downloads</div>
            <div style="padding:2px 0;">Documents</div>
          </div>
          <div class="finder-files">
            <div class="file-icon">
              <svg viewBox="0 0 48 48" fill="none"><rect x="10" y="6" width="28" height="24" rx="3" fill="#E5E7EB"/><rect x="16" y="10" width="16" height="16" rx="2" fill="#3B82F6"/></svg>
              <div>Projects</div>
            </div>
            <div class="file-icon">
              <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="16" fill="#10B981"/><circle cx="18" cy="18" r="4" fill="#ECFDF5"/></svg>
              <div>Photos</div>
            </div>
          </div>
        </div>
      `;
    }

    function getSafariContent() {
      return `<div style="background:#1e1e2a; padding:12px; border-radius:8px;">Safari — Web Browser<br>Address bar: https://apple.com</div>`;
    }

    function getTerminalContent() {
      return `<div style="background:#0d0d0d; color:#0f0; padding:10px; font-family:monospace;">Last login: Fri May 14 10:42:21 on ttys000<br>user@MacBook ~ % </div>`;
    }

    function openApp(appName) {
      switch(appName) {
        case 'finder': createWindow('Finder', getFinderContent()); break;
        case 'safari': createWindow('Safari', getSafariContent()); break;
        case 'notes': createWindow('Notes', '<p>New note</p>'); break;
        case 'settings': createWindow('System Settings', '<p>Settings panel</p>'); break;
        case 'terminal': createWindow('Terminal', getTerminalContent()); break;
        case 'photos': createWindow('Photos', '<p>Photos library</p>'); break;
        case 'music': createWindow('Music', '<p>Music player</p>'); break;
        case 'messages': createWindow('Messages', '<p>Messages app</p>'); break;
        default: createWindow(appName, `<p>${appName} window</p>`);
      }
    }

    document.querySelectorAll('.dock-item').forEach(item => {
      item.addEventListener('click', () => openApp(item.dataset.open));
    });

    document.querySelectorAll('.desktop-icon').forEach(icon => {
      icon.addEventListener('click', () => {
        const target = icon.dataset.open;
        if (target === 'macintosh-hd') createWindow('Macintosh HD', getFinderContent());
        else if (target === 'documents') createWindow('Documents', '<p>Document files</p>');
        else if (target === 'downloads') createWindow('Downloads', '<p>Downloaded items</p>');
        else if (target === 'applications') createWindow('Applications', '<p>App folder</p>');
        else if (target === 'trash') createWindow('Trash', '<p>Trash is empty</p>');
      });
    });

    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => openApp(item.dataset.open));
    });

    document.querySelector('.apple-logo').addEventListener('click', () => {
      createWindow('About This Mac', '<p>macOS Sequoia<br>Version 15.0</p>');
    });

    setTimeout(() => {
      createWindow('Finder', getFinderContent());
    }, 100);
  })();
</script>
</body>
</html>
